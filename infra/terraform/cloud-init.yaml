#cloud-config
package_update: true
package_upgrade: true

packages:
  - git
  - docker.io

runcmd:
  - curl -L "https://github.com/docker/compose/releases/download/v2.26.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
  - chmod +x /usr/local/bin/docker-compose

  - systemctl enable docker
  - systemctl start docker

  - usermod -aG docker azureuser

  - mkdir -p /home/azureuser/app

  - git clone https://github.com/yanavyklyuk/open-data-ai-analytics.git /home/azureuser/app

  - chown -R azureuser:azureuser /home/azureuser/app

  - /usr/local/bin/docker-compose -f /home/azureuser/app/docker-compose.yml up -d

  - /usr/local/bin/docker-compose -f /home/azureuser/app/monitoring/docker-compose.monitoring.yml up -d